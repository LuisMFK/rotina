<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minha Semana">
<title>Minha Semana</title>
<style>
:root {
  --bg:#F7F6F2;--card:#FFFFFF;--border:#E8E6DF;--text:#1A1A18;--muted:#8A8880;--accent:#2D5A3D;
  --study:#3C3489;--study-bg:#EEEDFE;--work:#085041;--work-bg:#E1F5EE;
  --ai:#854F0B;--ai-bg:#FAEEDA;--sport:#7A2E1A;--sport-bg:#FAECE7;
  --ritual:#72243E;--ritual-bg:#FBEAF0;--free:#444441;--free-bg:#F1EFE8;
  --tech:#1A4A6B;--tech-bg:#E3F0FA;--tema:#4A1A6B;--tema-bg:#F0E3FA;
  --radius:14px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#131312;--card:#1E1E1C;--border:#2A2A28;--text:#F0EEE8;--muted:#888680;--accent:#5DCAA5;
  --study:#CECBF6;--study-bg:#26215C;--work:#9FE1CB;--work-bg:#04342C;
  --ai:#FAC775;--ai-bg:#412402;--sport:#F5C4B3;--sport-bg:#4A1B0C;
  --ritual:#F4C0D1;--ritual-bg:#4B1528;--free:#D3D1C7;--free-bg:#2C2C2A;
  --tech:#A8D4F0;--tech-bg:#0D2A3D;--tema:#D4A8F0;--tema-bg:#2A0D3D;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.app-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.week-nav{display:flex;align-items:center;gap:10px;}
.week-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.week-label{font-size:13px;font-weight:500;color:var(--muted);min-width:70px;text-align:center;}
.day-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:7px 14px;border-radius:20px 20px 0 0;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.15s;position:relative;}
.day-tab.active{background:var(--card);color:var(--accent);font-weight:600;}
.day-tab.today::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
.content{padding:16px;max-width:480px;margin:0 auto;}
.banner{border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;border:1px solid;}
.banner.tech{background:var(--tech-bg);border-color:var(--tech);color:var(--tech);}
.banner.tema{background:var(--tema-bg);border-color:var(--tema);color:var(--tema);}
.banner.empresa{background:var(--work-bg);border-color:var(--work);color:var(--work);}
.banner.revisao{background:var(--ritual-bg);border-color:var(--ritual);color:var(--ritual);}
.banner.done{opacity:0.5;}
.b-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7;margin-bottom:4px;}
.b-title{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.b-sub{font-size:12px;opacity:0.8;line-height:1.4;}
.b-time{font-size:11px;opacity:0.6;margin-top:6px;}
.sl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;}
.sl:first-child{margin-top:0;}
.block{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.bh{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;}
.bi{font-size:20px;flex-shrink:0;margin-top:1px;}
.binfo{flex:1;min-width:0;}
.bt{font-size:11px;color:var(--muted);margin-bottom:2px;}
.btitle{font-size:14px;font-weight:600;line-height:1.3;}
.bsub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:5px;}
.ts{background:var(--study-bg);color:var(--study);}
.tw{background:var(--work-bg);color:var(--work);}
.tsp{background:var(--sport-bg);color:var(--sport);}
.tr{background:var(--ritual-bg);color:var(--ritual);}
.tf{background:var(--free-bg);color:var(--free);}
.ttech{background:var(--tech-bg);color:var(--tech);}
.ttema{background:var(--tema-bg);color:var(--tema);}
.alink{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--sport);text-decoration:none;padding:8px 14px;border-top:1px solid var(--border);background:var(--sport-bg);}
.note-wrap{border-top:1px solid var(--border);padding:10px 14px;}
.note-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:5px;}
.note-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;line-height:1.5;}
.note-inp:focus{border-color:var(--accent);}
.note-inp::placeholder{color:var(--muted);}
.cl{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:8px;}
.cl-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--ritual);}
.ci{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ci:last-child{border-bottom:none;padding-bottom:0;}
.ci input{margin-top:2px;width:16px;height:16px;flex-shrink:0;accent-color:var(--ritual);cursor:pointer;}
.ci-lbl{font-size:13px;line-height:1.4;transition:opacity 0.2s;}
.ci.done .ci-lbl{text-decoration:line-through;opacity:0.4;}
.sum-btn{width:100%;padding:12px;border-radius:var(--radius);border:1px dashed var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;padding:20px;align-items:flex-end;}
.modal.open{display:flex;}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;padding:20px;max-height:70vh;overflow-y:auto;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.sh h2{font-size:17px;font-weight:700;}
.sc{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sd{margin-bottom:14px;}
.sd h3{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:6px;}
.sn{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border);line-height:1.4;}
.sn:last-child{border-bottom:none;}
.se{font-size:12px;color:var(--muted);font-style:italic;}
.fab{position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.2);z-index:50;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="app-title">Minha Semana</div>
    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="wl"></span>
      <button class="week-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="day-tabs" id="dt"></div>
</div>
<div class="content" id="ct"></div>
<button class="fab" onclick="openSum()">📊</button>
<div class="modal" id="modal" onclick="closeSum(event)">
  <div class="sheet">
    <div class="sh"><h2>Resumo da semana</h2><button class="sc" onclick="closeSum()">×</button></div>
    <div id="sc"></div>
  </div>
</div>
<script>
const DAYS=['Segunda','Terça','Quarta','Quinta','Sexta'];
const DS=['Seg','Ter','Qua','Qui','Sex'];
let wo=0,ad=0;

const TECH=[
  {n:1,done:true,title:'Fluxo de caixa e aluguel',sub:'✅ Já realizada',time:'—'},
  {n:2,done:false,title:'Criar assistente personalizado da empresa',sub:'Claude com contexto fixo do seu negócio',time:'14h–16h'},
  {n:3,done:false,title:'Triagem de e-mails com Gmail',sub:'Classificar, responder e arquivar automaticamente',time:'14h–15h30'},
  {n:4,done:false,title:'Dashboard de investimentos pessoais',sub:'Consolida todos os relatórios num lugar só',time:'14h–16h'},
  {n:5,done:false,title:'Zapier — conectar apps sem programar',sub:'Automações reais: aluguel vence → aviso no WhatsApp',time:'14h–16h'},
  {n:6,done:false,title:'Revisar contratos com Claude',sub:'PDF entra, riscos e problemas saem',time:'14h–15h30'},
  {n:7,done:false,title:'Resumo de reunião automático',sub:'Anotações viram ata estruturada',time:'14h–15h'},
  {n:8,done:false,title:'Monitor semanal de notícias',sub:'Briefing de mercado toda segunda automaticamente',time:'14h–15h'},
  {n:9,done:false,title:'Pesquisa de mercado sob demanda',sub:'Análise de FIIs e ações com IA',time:'14h–16h'},
  {n:10,done:false,title:'Bloomberg e Investing.com na prática',sub:'Indicadores, alertas, o que monitorar',time:'14h–16h'},
  {n:11,done:false,title:'Apresentações automáticas com Gamma',sub:'Dados entram, slides saem',time:'14h–15h30'},
  {n:12,done:false,title:'Carteira de ações',sub:'Preço médio, dividendos, rentabilidade',time:'14h–16h'},
  {n:13,done:false,title:'Simulador de financiamento',sub:'Compara cenários de compra de imóvel',time:'14h–15h30'},
  {n:14,done:false,title:'Controle de contratos',sub:'Todos ativos, vencimentos, alertas',time:'14h–15h30'},
  {n:15,done:false,title:'Comparador de imóveis',sub:'Cap rate, retorno, análise lado a lado',time:'14h–16h'},
  {n:16,done:false,title:'GitHub Pages avançado',sub:'Atualizar seu app sozinho, criar novos mini-apps',time:'14h–15h30'},
];

const TEMA=[
  {n:1,title:'Tomar decisões melhores com dados',sub:'Por que o cérebro decide mal e como usar dados pra decidir melhor'},
  {n:2,title:'Como funciona a mente de um negociador',sub:'Técnicas de negociação pra contratos, imóveis e conversas difíceis'},
  {n:3,title:'Como os ricos usam dívida pra ficar mais ricos',sub:'Alavancagem, dívida boa vs ruim, pensar diferente sobre crédito'},
  {n:4,title:'Como ler um balanço em 15 minutos',sub:'DRE, balanço patrimonial e fluxo de caixa sem ser contador'},
  {n:5,title:'Como montar um sistema pessoal de informação',sub:'Filtrar o que vale ler e ouvir pra decidir melhor'},
  {n:6,title:'O que muda quando você automatiza 20% das tarefas',sub:'Mapear seu tempo e identificar o que a IA pode assumir'},
  {n:7,title:'Como funciona o cérebro quando você procrastina',sub:'Neurociência por trás da dificuldade de começar'},
  {n:8,title:'O que é um CRM e por que sua empresa precisa de um',sub:'Organizar relacionamento com inquilinos, parceiros e clientes'},
  {n:9,title:'Como funciona o mercado de arte e ativos alternativos',sub:'Vinho, relógios, arte como investimento — retorno real e riscos'},
  {n:10,title:'Gastronomia como negócio',sub:'Por que restaurantes quebram, como chefs viraram CEOs'},
  {n:11,title:'Como funciona a indústria do esporte profissional',sub:'Clubes como empresas, direitos de transmissão, atleta como marca'},
  {n:12,title:'O que é design thinking',sub:'Como as empresas mais inovadoras resolvem problemas'},
  {n:13,title:'Como funcionam os maiores negócios de internet',sub:'Por que Google e Meta são gratuitos e como ganham dinheiro com você'},
  {n:14,title:'História das maiores crises econômicas',sub:'1929, 2008, hiperinflação — o que cada uma ensina sobre patrimônio'},
  {n:15,title:'Como criar sites simples e vender pra negócios locais',sub:'Restaurantes, clínicas, lojas — quanto cobrar e como escalar'},
  {n:16,title:'Como criar jogos simples com IA',sub:'Do zero ao jogo no celular sem saber programar'},
  {n:17,title:'Como monetizar tecnologia sem ser programador',sub:'Modelos de negócio digitais que qualquer pessoa pode começar hoje'},
];

const STRETCH={
  0:{url:'https://www.youtube.com/watch?v=vCU9UBlpuEE',label:'▶ Despertar — mobilidade geral'},
  1:{url:'https://www.youtube.com/watch?v=GeFobZjgE_4',label:'▶ 21 exercícios de ativação — pré-futebol'},
  2:{url:'https://www.youtube.com/watch?v=6vSyPrcnOgU',label:'▶ Rotina matinal 10 min — pré-tênis'},
  3:{url:'https://www.correiobraziliense.com.br/cbradar/os-5-alongamentos-para-fazer-em-10-minutos-e-comecar-o-dia-bem/',label:'▶ 5 alongamentos em 10 min'},
  4:{url:'https://www.youtube.com/watch?v=vCU9UBlpuEE',label:'▶ Exercícios matinais — fechar a semana'}
};

const CL={
  0:['Abrir material de estudo de amanhã (terça)','Anotar o módulo/capítulo específico','Checar pendências de empresa pra terça','Separar roupa do futebol','Celular longe da cama'],
  1:['Abrir material de estudo de amanhã (quarta)','Anotar o módulo/capítulo específico','Separar bolsa do tênis (quarta 12h–14h)','Checar pendências de empresa pra quarta','Celular longe da cama'],
  2:['Abrir material de estudo de amanhã (quinta)','Anotar o módulo/capítulo específico','Checar pendências de empresa pra quinta','Posso marcar esporte quinta? (Total App)','Celular longe da cama'],
  3:['Abrir material de estudo de amanhã (sexta)','Anotar o módulo/capítulo específico','Fechar pendências de empresa com prazo sexta','Pensar no que fazer no fim de semana','Celular longe da cama'],
  4:['Abrir material de estudo de segunda','Anotar os módulos da semana que vem','Listar pendências de empresa com prazo','Separar roupa do tênis de segunda (12h–13h)','Celular longe da cama']
};

function mon(date){const d=new Date(date),day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
function wdates(o){const m=mon(new Date());m.setDate(m.getDate()+o*7);return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function todayIdx(){const d=new Date().getDay();return(d===0||d===6)?0:d-1;}
function sk(dates,di,f){const d=dates[di];return`rtn:${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}:${f}`;}
function sn(dates,di,id,v){localStorage.setItem(sk(dates,di,`note:${id}`),v);}
function ln(dates,di,id){return localStorage.getItem(sk(dates,di,`note:${id}`))||'';}
function sc2(dates,di,ii,c){localStorage.setItem(sk(dates,di,`check:${ii}`),c?'1':'0');}
function lc(dates,di,ii){return localStorage.getItem(sk(dates,di,`check:${ii}`))==='1';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function nb(dates,di,id,ph){
  const v=ln(dates,di,id);
  return`<div class="note-wrap"><div class="note-lbl">📝 Nota</div><textarea class="note-inp" rows="2" placeholder="${ph}" oninput="sn(window._d,${di},'${id}',this.value)">${esc(v)}</textarea></div>`;
}

function fwl(dates){
  const M=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const a=dates[0],b=dates[4];
  return a.getMonth()===b.getMonth()?`${a.getDate()}–${b.getDate()} ${M[a.getMonth()]}`:`${a.getDate()} ${M[a.getMonth()]} – ${b.getDate()} ${M[b.getMonth()]}`;
}

function renderWeek(){
  const dates=wdates(wo);
  document.getElementById('wl').textContent=fwl(dates);
  const ti=wo===0?todayIdx():-1;
  document.getElementById('dt').innerHTML=DS.map((s,i)=>`<button class="day-tab${i===ad?' active':''}${i===ti?' today':''}" onclick="switchDay(${i})">${s} ${dates[i].getDate()}</button>`).join('');
  renderDay(dates);
}

function renderDay(dates){
  const i=ad;
  const s=STRETCH[i];
  const checks=CL[i];

  // Get sessions for this week
  const techTue=TECH[Math.min(TECH.length-1,wo*2)];
  const techThu=TECH[Math.min(TECH.length-1,wo*2+1)];
  const temaMon=TEMA[Math.min(TEMA.length-1,wo*2)];
  const temaWed=TEMA[Math.min(TEMA.length-1,wo*2+1)];

  // Banner
  let banner='';
  if(i===0){
    banner=`<div class="banner tema"><div class="b-eyebrow">🎯 Tema Livre — Sessão ${temaMon.n}</div><div class="b-title">${temaMon.title}</div><div class="b-sub">${temaMon.sub}</div><div class="b-time">Abra o chat com Claude às 14h</div></div>`;
  }else if(i===1){
    banner=`<div class="banner tech${techTue.done?' done':''}"><div class="b-eyebrow">💻 Tecnologia — Sessão ${techTue.n}${techTue.done?' ✅':''}</div><div class="b-title">${techTue.title}</div><div class="b-sub">${techTue.sub}</div><div class="b-time">${techTue.done?'Já realizada':'Abra o chat com Claude às '+techTue.time}</div></div>`;
  }else if(i===2){
    banner=`<div class="banner tema"><div class="b-eyebrow">🎯 Tema Livre — Sessão ${temaWed.n}</div><div class="b-title">${temaWed.title}</div><div class="b-sub">${temaWed.sub}</div><div class="b-time">Abra o chat com Claude às 14h</div></div>`;
  }else if(i===3){
    banner=`<div class="banner tech"><div class="b-eyebrow">💻 Tecnologia — Sessão ${techThu.n}</div><div class="b-title">${techThu.title}</div><div class="b-sub">${techThu.sub}</div><div class="b-time">Abra o chat com Claude às ${techThu.time}</div></div>`;
  }else{
    banner=`<div class="banner revisao"><div class="b-eyebrow">📋 Revisão + Planejamento</div><div class="b-title">Fechar a semana e planejar a próxima</div><div class="b-sub">O que aprendi? Temas da semana que vem. Pendências de empresa.</div><div class="b-time">Abra o chat com Claude às 13h30</div></div>`;
  }

  let h=banner;

  // MORNING
  h+=`<div class="sl">☀️ Ritual de manhã</div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">⏰</div><div class="binfo"><div class="bt">8:00</div><div class="btitle">Acorda — sem celular</div><div class="bsub">Alarme, banheiro, sem checar nada.</div></div></div></div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">☕</div><div class="binfo"><div class="bt">8:05</div><div class="btitle">Cafezinho preto <span class="tag tr">âncora</span></div><div class="bsub">Café na mão = dia começou.</div></div></div></div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">🧘</div><div class="binfo"><div class="bt">8:10 — 10 min</div><div class="btitle">Alongamento matinal</div><div class="bsub">${i===1?'Foco em pernas e quadril — futebol hoje.':i===2?'Foco em ombros e pescoço — tênis hoje.':'Mobilidade geral, respiração.'}</div></div></div><a class="alink" href="${s.url}" target="_blank">${s.label}</a></div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">🚿</div><div class="binfo"><div class="bt">8:20</div><div class="btitle">Banho <span class="tag tr">transição</span></div><div class="bsub">Sai do banho = modo ativo.</div></div></div></div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">📋</div><div class="binfo"><div class="bt">8:40</div><div class="btitle">Revisar plano do dia</div><div class="bsub">Já decidido ontem. Só confirma e começa.</div></div></div></div>`;

  // STUDY
  h+=`<div class="sl">📚 Estudo — Certificado</div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">📖</div><div class="binfo"><div class="bt">9:00 — 50 min</div><div class="btitle">Bloco 1 de estudo <span class="tag ts">certificado</span></div><div class="bsub">Timer ligado. Celular no outro cômodo.</div></div></div>${nb(dates,i,'s1','Ex: Aula 4 — módulo de contratos')}</div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">🧃</div><div class="binfo"><div class="bt">9:50 — 10 min</div><div class="btitle">Pausa ativa</div><div class="bsub">Levanta, água, estica. Sem celular.</div></div></div></div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">📖</div><div class="binfo"><div class="bt">10:00 — 50 min</div><div class="btitle">${i===3?'Bloco 2 — revisão da semana':'Bloco 2 de estudo'} <span class="tag ts">certificado</span></div><div class="bsub">${i===3?'Revisar o que ficou com dúvida.':'Continua. Anota dúvidas.'}</div></div></div>${nb(dates,i,'s2','Ex: Aula 5 — revisão de conceitos')}</div>`;

  // SPORT + LUNCH (12h–14h todos os dias)
  if(i===0){
    h+=`<div class="sl">🎾 Esporte + Almoço</div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">🎾</div><div class="binfo"><div class="bt">12h–13h</div><div class="btitle">Tênis <span class="tag tsp">esporte</span></div></div></div></div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">🍽️</div><div class="binfo"><div class="bt">13h–14h</div><div class="btitle">Almoço em casa</div><div class="bsub">Come sem tela. Descanso real.</div></div></div></div>`;
  } else if(i===1){
    h+=`<div class="sl">⚽ Esporte + Almoço</div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">⚽</div><div class="binfo"><div class="bt">12h–13h</div><div class="btitle">Futebol <span class="tag tsp">Total App</span></div></div></div></div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">🍽️</div><div class="binfo"><div class="bt">13h–14h</div><div class="btitle">Almoço em casa</div><div class="bsub">Come sem tela. Descanso real.</div></div></div></div>`;
  } else if(i===2){
    h+=`<div class="sl">🎾 Esporte + Almoço</div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">🎾</div><div class="binfo"><div class="bt">12h–14h</div><div class="btitle">Tênis <span class="tag tsp">esporte</span></div></div></div></div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">🍽️</div><div class="binfo"><div class="bt">14h (após tênis)</div><div class="btitle">Almoço rápido em casa</div><div class="bsub">Come sem tela. Descansa até 14h15.</div></div></div></div>`;
  } else {
    h+=`<div class="sl">🍽️ Almoço</div>`;
    h+=`<div class="block"><div class="bh"><div class="bi">🍽️</div><div class="binfo"><div class="bt">12h–14h</div><div class="btitle">Almoço + descanso</div><div class="bsub">Come sem tela. Recarrega para a tarde.</div></div></div></div>`;
  }

  // AFTERNOON
  const pm={
    0:{f:{ic:'🎯',tg:'ttema',ti:'Tema Livre',tm:'14h15–15h45',su:''},s:{ic:'🏢',tg:'tw',ti:'Empresa',tm:'16h–18h',su:'Contratos / contador'}},
    1:{f:{ic:'🏢',tg:'tw',ti:'Empresa',tm:'14h15–16h',su:'Investimentos / time'},s:{ic:'💻',tg:'ttech',ti:'Tecnologia',tm:'16h–18h',su:''}},
    2:{f:{ic:'🏢',tg:'tw',ti:'Empresa',tm:'14h30–16h',su:'Pendências abertas'},s:{ic:'🎯',tg:'ttema',ti:'Tema Livre',tm:'16h–18h',su:''}},
    3:{f:{ic:'💻',tg:'ttech',ti:'Tecnologia',tm:'14h15–16h',su:''},s:{ic:'🏢',tg:'tw',ti:'Empresa',tm:'16h–18h',su:'Reuniões / follow-up'}},
    4:{f:{ic:'📋',tg:'tr',ti:'Revisão + Planejamento',tm:'14h15–15h30',su:''},s:{ic:'🏢',tg:'tw',ti:'Empresa',tm:'15h30–18h',su:'Fechar pendências da semana'}}
  }[i];

  h+=`<div class="sl">🌇 Tarde</div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">${pm.f.ic}</div><div class="binfo"><div class="bt">${pm.f.tm}</div><div class="btitle">${pm.f.ti} <span class="tag ${pm.f.tg}">${pm.f.ti}</span></div>${pm.f.su?`<div class="bsub">${pm.f.su}</div>`:''}</div></div>${nb(dates,i,'p1','Anotações da sessão...')}</div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">${pm.s.ic}</div><div class="binfo"><div class="bt">${pm.s.tm}</div><div class="btitle">${pm.s.ti} <span class="tag ${pm.s.tg}">${pm.s.ti}</span></div>${pm.s.su?`<div class="bsub">${pm.s.su}</div>`:''}</div></div>${nb(dates,i,'p2','Ex: BTG nota fiscal, Rio de Janeiro...')}</div>`;
  h+=`<div class="block"><div class="bh"><div class="bi">✅</div><div class="binfo"><div class="bt">18:00</div><div class="btitle">Fechar tarefas do dia</div><div class="bsub">O que ficou aberto vai pra amanhã.</div></div></div></div>`;

  // NIGHT
  h+=`<div class="sl">🌙 Noite — a partir das 19h</div><div class="block"><div class="bh"><div class="bi">👥</div><div class="binfo"><div class="bt">19:00+</div><div class="btitle">Tempo livre <span class="tag tf">livre</span></div><div class="bsub">Amigos, sair, esporte noturno. Sem culpa.</div></div></div></div>`;

  // CHECKLIST
  h+=`<div class="sl">🌙 Ritual de encerramento — 21h30</div>`;
  h+=`<div class="cl"><div class="cl-title">Checklist de encerramento</div>${checks.map((t,x)=>{const c=lc(dates,i,x);return`<label class="ci${c?' done':''}"><input type="checkbox" ${c?'checked':''} onchange="tc(event,window._d,${i},${x})"><span class="ci-lbl">${t}</span></label>`;}).join('')}</div>`;
  h+=`<button class="sum-btn" onclick="openSum()">📊 Ver resumo da semana</button>`;
  h+=`<div style="height:80px"></div>`;

  document.getElementById('ct').innerHTML=h;
  window._d=dates;
}

function switchDay(i){ad=i;renderWeek();}
function changeWeek(d){wo=Math.max(0,wo+d);renderWeek();}
function tc(e,dates,di,ii){const c=e.target.checked;sc2(dates,di,ii,c);e.target.closest('.ci').classList.toggle('done',c);}

function openSum(){
  const dates=wdates(wo);
  let h='';
  DAYS.forEach((day,i)=>{
    const keys=['s1','s2','p1','p2'];
    const labels=['Estudo bloco 1','Estudo bloco 2','Sessão tarde 1','Sessão tarde 2'];
    const notes=keys.map((k,j)=>{const v=ln(dates,i,k);return v?`<div class="sn"><strong>${labels[j]}:</strong> ${esc(v)}</div>`:''}).join('');
    h+=`<div class="sd"><h3>${day} ${dates[i].getDate()}</h3>${notes||'<div class="se">Sem notas</div>'}</div>`;
  });
  document.getElementById('sc').innerHTML=h;
  document.getElementById('modal').classList.add('open');
}

function closeSum(e){
  if(!e||e.target===document.getElementById('modal')||e.target.classList.contains('sc'))
    document.getElementById('modal').classList.remove('open');
}

ad=todayIdx();
renderWeek();
</script>
</body>
</html>
